<!DOCTYPE html>
<html>
<head>
<title>Misión de mi dúo</title>

<style>

body{
background:#0f172a;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:40px;
}

.game{
margin-top:40px;
}

.star{
font-size:40px;
cursor:pointer;
margin:20px;
display:inline-block;
}

#mensaje{
margin-top:30px;
font-size:20px;
}

#final{
margin-top:30px;
font-size:22px;
color:#facc15;
}

</style>

</head>

<body>

<h1>🎮 Misión secreta</h1>

<p>Encuentra las 3 estrellas para desbloquear el mensaje final</p>

<div class="game">

<span class="star" onclick="estrella()">⭐</span>
<span class="star" onclick="estrella()">⭐</span>
<span class="star" onclick="estrella()">⭐</span>
<span class="star" onclick="fail()">🎮</span>
<span class="star" onclick="fail()">🎮</span>
<span class="star" onclick="fail()">🎮</span>

</div>

<p id="mensaje"></p>

<p id="final"></p>

<script>

let contador = 0;

function estrella(){

contador++;

document.getElementById("mensaje").innerHTML =
"⭐ Encontraste una estrella";

if(contador == 3){

document.getElementById("final").innerHTML =
"💜 Misión completada<br><br>Entre todas las partidas... ganar o perder no importa tanto.<br><br>Lo mejor siempre es jugar contigo.<br><br>Gracias por ser mi dúo en rank.";

}

}

function fail(){

document.getElementById("mensaje").innerHTML =
"❌ Ese no era... intenta otra vez";

}

</script>

</body>

</html>
